---
layout: default
---

<div class="home">
  {{ content }}

  <ul class="post-list" style="margin-top: 1em;">
    {%- for post in site.posts -%}
    <li style="margin-bottom: 0.3em;">
      <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </li>
    {%- endfor -%}
  </ul>
</div>
